<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ことばみち</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6efe0; --ink:#3a3340;
    --coral:#ff8a5c; --grass:#7fbf6a; --soil:#caa06a;
    --ice:#5cc4ea; --grape:#a06cff; --gold:#ffce5c;
    --card:#fffdf6; --line:#eadfc6;
    --font:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN",system-ui,sans-serif;
    --sh-lift:0 12px 28px rgba(60,45,40,.16);
    --sh-btn:0 3px 0 rgba(60,45,40,.14);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:var(--font); color:var(--ink); background:radial-gradient(900px 500px at 50% -10%,#fff9ee 0%,transparent 60%),#ebe1cb; min-height:100%; display:flex; flex-direction:column; align-items:center; padding:14px 12px 28px; overflow-x:hidden; }
  .wrap{ width:100%; max-width:960px; display:flex; flex-direction:column; gap:10px; }
  .top{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; padding:0 2px; }
  .brand{ display:flex; align-items:baseline; gap:.45em; min-width:0; }
  .brand b{ font-weight:800; font-size:clamp(20px,5vw,26px); letter-spacing:.02em; }
  .brand small{ font-weight:500; opacity:.55; font-size:clamp(11px,2.5vw,13px); }
  .top-right{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .pill{ background:var(--card); border:1px solid var(--line); border-radius:999px; padding:5px 12px; font-weight:700; font-size:13px; display:flex; align-items:center; gap:.4em; white-space:nowrap; }
  .pill b{ font-weight:800; }
  .pill .sep{ width:1px; height:12px; background:var(--line); margin:0 .2em; }
  .icon-btn{ border:1px solid var(--line); cursor:pointer; font-family:var(--font); font-weight:800; font-size:12px; color:var(--ink); background:var(--card); border-radius:999px; height:30px; padding:0 11px; }
  .rules{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .rulecard{ display:inline-flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:6px 10px 6px 14px; cursor:pointer; transition:transform .08s; }
  .rulecard:active{ transform:scale(.97); }
  .rulecard .sentence{ font-weight:700; font-size:13px; display:flex; align-items:center; gap:.35em; white-space:nowrap; }
  .rulecard .word{ background:var(--gold); color:#5a4015; border-radius:999px; padding:2px 10px; font-weight:800; }
  .rulecard .word.ice{ background:var(--ice); color:#0a3a4d; }
  .rulecard .flip{ font-weight:800; opacity:.35; }
  .stage{ background:linear-gradient(180deg,#fffaf0,#f0e7d3); border-radius:20px; padding:10px 10px 6px; box-shadow:var(--sh-lift),inset 0 1px 0 rgba(255,255,255,.7); position:relative; }
  .canvas-wrap{ position:relative; border-radius:14px; overflow:hidden; line-height:0; box-shadow:inset 0 0 0 2px rgba(60,45,40,.05); }
  canvas{ width:100%; height:auto; display:block; touch-action:none; cursor:crosshair; }
  .toast{ position:absolute; left:50%; top:12px; transform:translateX(-50%); background:rgba(58,51,64,.92); color:#fff; padding:7px 16px; border-radius:999px; font-weight:800; font-size:14px; pointer-events:none; opacity:0; transition:opacity .35s; white-space:nowrap; max-width:92%; overflow:hidden; text-overflow:ellipsis; }
  .toast.show{ opacity:1; }
  .banner{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:rgba(255,250,240,.86); backdrop-filter:blur(2px); }
  .banner.show{ display:flex; }
  .banner h2{ margin:0; font-size:clamp(26px,7vw,44px); font-weight:800; color:var(--coral); }
  .banner .sub{ font-weight:700; opacity:.75; }
  .bbtn{ font-family:var(--font); font-weight:800; font-size:18px; border:none; cursor:pointer; background:var(--coral); color:#fff; border-radius:16px; padding:12px 26px; box-shadow:0 5px 0 #d9683e; }
  .bbtn:active{ transform:translateY(3px); box-shadow:0 2px 0 #d9683e; }
  .share-btn{ background:var(--ice) !important; color:#003a4d !important; box-shadow:0 4px 0 #3a9cb8 !important; font-size:15px !important; }
  .inkrow{ display:flex; align-items:center; gap:8px; padding:8px 6px 4px; }
  .inkrow .ink-label{ font-size:13px; }
  .inkbar{ flex:1; height:10px; background:#e3d8bf; border-radius:999px; overflow:hidden; }
  .inkfill{ height:100%; width:100%; background:linear-gradient(90deg,#7fbf6a,#bfe07a); border-radius:999px; transition:width .12s; }
  .palette{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .mat{ border:none; cursor:pointer; font-family:var(--font); background:var(--card); border-radius:14px; width:74px; height:58px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; box-shadow:var(--sh-btn); outline:3px solid transparent; outline-offset:1px; transition:transform .08s,outline-color .12s; }
  .mat .emo{ font-size:20px; line-height:1; }
  .mat .lbl{ font-size:11.5px; font-weight:800; line-height:1; display:flex; align-items:center; }
  .mat:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(60,45,40,.14); }
  .mat[aria-pressed="true"]{ outline-color:var(--coral); }
  .mat.cmd .lbl::after{ content:""; width:5px; height:5px; border-radius:50%; background:var(--coral); margin-left:4px; }
  .mat.tool{ background:#f2ecdc; width:56px; }
  .controls{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; align-items:center; }
  .btn{ border:none; cursor:pointer; font-family:var(--font); font-weight:800; border-radius:14px; padding:10px 18px; font-size:15px; display:flex; align-items:center; gap:.4em; box-shadow:var(--sh-btn); transition:transform .08s; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(60,45,40,.18); }
  .btn.go{ background:var(--grass); color:#1c3a12; box-shadow:0 4px 0 #5d9c4b; }
  .btn.ghost{ background:var(--card); color:var(--ink); }
  .seg{ display:flex; gap:2px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:3px; }
  .lvl{ width:32px; height:36px; border-radius:9px; border:none; cursor:pointer; font-family:var(--font); font-weight:800; font-size:14px; background:transparent; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; line-height:1; }
  .lvl .st{ font-size:7px; line-height:1; height:7px; color:#c9862a; letter-spacing:-1px; }
  .lvl[aria-pressed="true"]{ background:var(--gold); }
  .daily-btn{ border:1px solid var(--line); cursor:pointer; font-family:var(--font); font-weight:800; font-size:13px; color:var(--ink); background:var(--card); border-radius:12px; height:44px; padding:0 14px; }
  .daily-btn.active{ background:var(--coral); border-color:var(--coral); color:#fff; }
  .help{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 16px; font-size:12.5px; font-weight:500; line-height:1.9; opacity:.9; max-width:680px; margin:2px auto 0; }
  .help[hidden]{ display:none; }
  @media(max-width:520px){ .mat{ width:66px; height:54px; } .mat .emo{ font-size:18px; } .mat.tool{ width:50px; } .brand small{ display:none; } }
</style>
</head>
<body>
<div class="wrap">
<header class="top">
  <div class="brand">
    <b>✏️ ことばみち</b>
    <small id="brandSub">せんを ひいて、みんなを おうちへ</small>
  </div>
  <div class="top-right">
    <div class="pill" id="dayPill" style="display:none">📅 <b id="dayNum">0</b><span id="streakPill" style="display:none">🔥<b id="streakN">0</b></span></div>
    <div class="pill">🏠 <b id="homeN">0</b>/<b id="goalN">0</b><span class="sep"></span>😵 <b id="lostN">0</b></div>
    <button class="icon-btn" id="langBtn">EN</button>
  </div>
</header>

<div class="rules" id="rules"></div>

<div class="stage">
  <div class="canvas-wrap">
    <canvas id="game" width="1000" height="600"></canvas>
    <div class="toast" id="toast"></div>
    <div class="banner" id="banner">
      <h2 id="bannerTitle"></h2>
      <div class="sub" id="bannerSub"></div>
      <button class="bbtn" id="bannerBtn"></button>
      <button class="bbtn share-btn" id="shareBtn" style="display:none">📋 Share</button>
    </div>
  </div>
  <div class="inkrow">
    <span class="ink-label">🖊</span>
    <div class="inkbar"><div class="inkfill" id="inkfill"></div></div>
  </div>
</div>

<div class="palette" id="palette"></div>

<div class="controls">
  <button class="btn go" id="startBtn">▶ スタート</button>
  <button class="btn ghost" id="resetBtn" title="Reset">🔄</button>
  <div class="seg" id="levels"></div>
  <button class="daily-btn" id="dailyBtn">📅 デイリー</button>
  <button class="icon-btn" id="helpBtn" style="height:44px;border-radius:12px;font-size:14px;">？</button>
</div>

<div class="help" id="footer" hidden></div>
</div>

<script>
(() => {
"use strict";
const W=1000,H=600;
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const WALK=88,R=10,HALF=5;

// ── Language ──────────────────────────────────────────────────────
let lang=localStorage.getItem('lang')||'ja';
function t(ja,en){ return lang==='ja'?ja:en; }

// ── Materials ─────────────────────────────────────────────────────
// cmd:true → creatures read this word when they touch it and obey
const MATS=[
  {id:'normal', emo:'✏️', ja:'ふつう',  en:'Road',   dja:'かたい みち', den:'solid',    col:'#3a3340', cmd:false},
  {id:'ice',    emo:'🧊', ja:'つるつる', en:'Ice',    dja:'すべる',      den:'slippery', col:'#5cc4ea', cmd:false},
  {id:'bounce', emo:'🌀', ja:'ぽよん',   en:'Spring', dja:'はねる',      den:'bouncy',   col:'#a06cff', cmd:false},
  {id:'turn',   emo:'↩',  ja:'もどれ',   en:'Turn',   dja:'むきをかえる',den:'reverses', col:'#ff8a5c', cmd:true},
  {id:'jump',   emo:'⤴',  ja:'とべ',     en:'Jump',   dja:'ジャンプする',den:'jumps',    col:'#2e9e6b', cmd:true},
  {id:'fast',   emo:'⚡', ja:'はやく',   en:'Fast',   dja:'はやくなる',  den:'speeds up',col:'#b8920a', cmd:true},
];
let curMat='normal';

// ── Rules ─────────────────────────────────────────────────────────
const rules={dir:1,grav:'normal'};

// ── Levels ────────────────────────────────────────────────────────
const LEVELS=[
  { ja:'わたる',      en:'Cross',      dir:1, total:12, goal:8,  ink:1500,
    spawn:{x:70,y:352},  goalRect:{x:858,y:316,w:96,h:60},
    fruits:[{x:400,y:300},{x:500,y:250},{x:600,y:300}],
    plats:[{x:-20,y:380,w:330,h:240,g:true},{x:690,y:380,w:350,h:240,g:true}] },

  { ja:'のりこえる',  en:'Climb',      dir:1, total:12, goal:8,  ink:1700,
    spawn:{x:70,y:222},  goalRect:{x:858,y:368,w:96,h:60},
    fruits:[{x:350,y:230},{x:505,y:250},{x:640,y:330}],
    plats:[{x:-20,y:250,w:260,h:370,g:true},{x:470,y:300,w:70,h:320,g:true},{x:740,y:430,w:300,h:200,g:true}] },

  { ja:'むきをかえる',en:'Turn',       dir:1, total:10, goal:6,  ink:1500,
    spawn:{x:430,y:272}, goalRect:{x:30,y:320,w:96,h:60},
    fruits:[{x:560,y:320},{x:250,y:300},{x:120,y:250}],
    plats:[{x:-20,y:384,w:180,h:240,g:true},{x:360,y:300,w:150,h:26,g:true}] },

  { ja:'くだる',      en:'Descend',    dir:1, total:10, goal:7,  ink:1600,
    spawn:{x:70,y:60},   goalRect:{x:858,y:470,w:96,h:60},
    fruits:[{x:300,y:190},{x:450,y:230},{x:560,y:390}],
    plats:[{x:-20,y:90,w:220,h:20,g:true},{x:390,y:290,w:130,h:20,g:true},{x:680,y:500,w:360,h:130,g:true}] },

  { ja:'はなれ島',    en:'Islands',    dir:1, total:12, goal:8,  ink:2200,
    spawn:{x:70,y:170},  goalRect:{x:858,y:190,w:96,h:60},
    fruits:[{x:250,y:220},{x:530,y:200},{x:770,y:170}],
    plats:[{x:-20,y:200,w:180,h:20,g:true},{x:330,y:270,w:140,h:20,g:true},{x:590,y:150,w:140,h:20,g:true},{x:810,y:220,w:230,h:410,g:true}] },

  { ja:'すれちがい',  en:'Crossroads', dir:1, total:10, goal:6,  ink:1400,
    spawn:{x:500,y:250}, goalRect:{x:46,y:316,w:96,h:60},
    fruits:[{x:300,y:320},{x:480,y:180},{x:680,y:320}],
    plats:[{x:-20,y:380,w:260,h:250,g:true},{x:340,y:280,w:280,h:20,g:true},{x:740,y:380,w:310,h:250,g:true}] },
];
let li=0,level=LEVELS[0];

// ── Save ──────────────────────────────────────────────────────────
const save=(()=>{try{return JSON.parse(localStorage.getItem('ktm-save')||'{}')}catch(e){return{}}})();
save.stars=save.stars||{};
save.daily=save.daily||{last:-99,streak:0};
function persist(){try{localStorage.setItem('ktm-save',JSON.stringify(save))}catch(e){}}
function calcStars(){return home>=level.total?3:home>=Math.ceil((level.goal+level.total)/2)?2:1;}

// ── Daily ─────────────────────────────────────────────────────────
const DAY_ORIGIN=new Date('2026-06-26').getTime();
function getDayNum(){ return Math.max(0,Math.floor((Date.now()-DAY_ORIGIN)/86400000)); }
let dailyMode=false;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// A new solvable-by-drawing layout every day, from the day number alone.
function genDaily(n){
  const rnd=mulberry32(((n+1)*2654435761)>>>0);
  const ly=250+Math.floor(rnd()*160), lw=170+Math.floor(rnd()*90);
  const ry=210+Math.floor(rnd()*240), rx=760+Math.floor(rnd()*80);
  const plats=[
    {x:-20,y:ly,w:lw+20,h:H-ly+20,g:true},
    {x:rx,y:ry,w:W-rx+20,h:H-ry+20,g:true},
  ];
  const nMid=1+Math.floor(rnd()*3),span=rx-lw;
  for(let i=0;i<nMid;i++){
    const mw=90+Math.floor(rnd()*90);
    const mx=lw+40+Math.floor((span-200)*(i+rnd()*0.7)/nMid);
    const my=150+Math.floor(rnd()*300);
    plats.push({x:mx,y:my,w:mw,h:18+Math.floor(rnd()*30),g:true});
  }
  const total=10+Math.floor(rnd()*5);
  const ink=1500+Math.floor(rnd()*1100);
  const fruits=plats.slice(2).map(p=>({x:p.x+p.w/2,y:p.y-38}));
  while(fruits.length<3)fruits.push({x:lw+80+Math.floor(rnd()*(span-160)),y:180+Math.floor(rnd()*200)});
  fruits.length=3;
  return { ja:'デイリー #'+n, en:'Daily #'+n, dir:1,
    total, goal:Math.max(5,Math.round(total*0.65)), ink,
    spawn:{x:60,y:ly-28},
    goalRect:{x:Math.min(rx+30,W-116),y:ry-64,w:96,h:60},
    fruits, plats };
}

// ── State ─────────────────────────────────────────────────────────
let strokes=[],creatures=[],particles=[],inkUsed=0,fruitsGot=[];
let running=false,spawned=0,spawnT=0,home=0,lost=0,won=false,gt=0;

// ── Level management ──────────────────────────────────────────────
function loadLevel(i){ applyLevel(LEVELS[i],i); }
function loadDaily(){
  const n=getDayNum();
  document.getElementById('dayNum').textContent=n;
  updateStreakPill();
  applyLevel(genDaily(n),-1);
}
function updateStreakPill(){
  const on=save.daily.streak>0&&save.daily.last>=getDayNum()-1;
  document.getElementById('streakPill').style.display=on?'':'none';
  document.getElementById('streakN').textContent=save.daily.streak;
}
function applyLevel(L,i){
  li=i; level=L; level.fruits=level.fruits||[];
  rules.dir=level.dir; rules.grav='normal';
  strokes=[]; creatures=[]; particles=[]; inkUsed=0;
  fruitsGot=level.fruits.map(()=>false);
  running=false; spawned=0; spawnT=0; home=0; lost=0; won=false;
  document.getElementById('goalN').textContent=level.goal;
  document.getElementById('shareBtn').style.display='none';
  document.getElementById('banner').classList.remove('show');
  [...document.getElementById('levels').children].forEach((b,k)=>b.setAttribute('aria-pressed',k===i));
  renderRules(); updateHUD(); syncStartBtn();
  toast('「'+(lang==='ja'?level.ja:level.en)+'」 '+t('ことばを かいて みちを つくろう','Write words — build the path'));
}
function resetAttempt(){
  creatures=[]; particles=[]; running=false; spawned=0; spawnT=0; home=0; lost=0; won=false;
  fruitsGot=level.fruits.map(()=>false);
  document.getElementById('shareBtn').style.display='none';
  document.getElementById('banner').classList.remove('show');
  updateHUD(); syncStartBtn();
}
function syncStartBtn(){
  document.getElementById('startBtn').textContent=(running?'⏸ ':'▶ ')+t(running?'とめる':'スタート',running?'Pause':'Start');
}

// ── Rules UI ──────────────────────────────────────────────────────
function renderRules(){
  const el=document.getElementById('rules'); el.innerHTML='';
  const a=document.createElement('div'); a.className='rulecard';
  a.innerHTML=`<div class="sentence">${t('みんなは','Everyone')} <span class="word" id="wDir">${rules.dir>0?t('みぎ ▶','Right ▶'):t('◀ ひだり','◀ Left')}</span> ${t('に あるく','walks')}</div><span class="flip">↻</span>`;
  a.addEventListener('click',()=>{
    rules.dir*=-1; for(const c of creatures)c.dir=rules.dir;
    document.getElementById('wDir').textContent=rules.dir>0?t('みぎ ▶','Right ▶'):t('◀ ひだり','◀ Left');
    toast(t('むきが かわった！','Direction flipped!')); blip(rules.dir>0?520:300);
  });
  const b=document.createElement('div'); b.className='rulecard';
  b.innerHTML=`<div class="sentence">${t('おもさは','Gravity is')} <span class="word${rules.grav==='float'?' ice':''}" id="wGrav">${rules.grav==='float'?t('ふわっ','Floaty'):t('ふつう','Normal')}</span></div><span class="flip">↻</span>`;
  b.addEventListener('click',()=>{
    rules.grav=rules.grav==='normal'?'float':'normal';
    const w=document.getElementById('wGrav');
    w.textContent=rules.grav==='float'?t('ふわっ','Floaty'):t('ふつう','Normal');
    w.className='word'+(rules.grav==='float'?' ice':'');
    toast(t('おもさが かわった！','Gravity changed!')); blip(rules.grav==='float'?660:330);
  });
  el.append(a,b);
}

// ── Palette ───────────────────────────────────────────────────────
function buildPalette(){
  const el=document.getElementById('palette'); el.innerHTML='';
  MATS.forEach(m=>{
    const b=document.createElement('button');
    b.className='mat'+(m.cmd?' cmd':''); b.type='button'; b.dataset.id=m.id;
    b.setAttribute('aria-pressed',m.id===curMat);
    b.innerHTML=`<span class="emo">${m.emo}</span><span class="lbl">${t(m.ja,m.en)}</span>`;
    b.title=t(m.dja,m.den);
    b.addEventListener('click',()=>{
      curMat=m.id;
      el.querySelectorAll('.mat:not(.tool)').forEach(x=>x.setAttribute('aria-pressed',x.dataset.id===curMat));
      toast(t(m.ja,m.en)+'！ '+t(m.dja,m.den)); blip(360);
    });
    el.appendChild(b);
  });
  const mk=(emo,lbl,fn)=>{
    const b=document.createElement('button'); b.className='mat tool'; b.type='button';
    b.innerHTML=`<span class="emo">${emo}</span><span class="lbl">${lbl}</span>`;
    b.addEventListener('click',fn); el.appendChild(b);
  };
  mk('↩',t('もどす','Undo'),()=>{ const s=strokes.pop(); if(s){inkUsed=Math.max(0,inkUsed-s.len);updateHUD();} });
  mk('🧽',t('けす','Clear'),()=>{ strokes=[];inkUsed=0;updateHUD(); });
}

// ── Drawing ───────────────────────────────────────────────────────
let drawing=false,cur=null;
function pt(e){ const r=canvas.getBoundingClientRect(); return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}; }
canvas.addEventListener('pointerdown',e=>{
  ensureAudio(); if(won)return;
  if(level.ink-inkUsed<=4){toast(t('インクが ない！','No ink! Use Undo or Clear'));return;}
  drawing=true; canvas.setPointerCapture(e.pointerId);
  const p=pt(e),m=MATS.find(x=>x.id===curMat)||MATS[0];
  cur={mat:curMat,half:HALF,pts:[p],len:0,cmd:m.cmd}; strokes.push(cur);
});
canvas.addEventListener('pointermove',e=>{
  if(!drawing||!cur)return;
  const p=pt(e),last=cur.pts[cur.pts.length-1],d=Math.hypot(p.x-last.x,p.y-last.y);
  if(d<7)return;
  if(level.ink-inkUsed<=0){drawing=false;toast(t('インクきれ！','Out of ink!'));return;}
  cur.pts.push(p); cur.len+=d; inkUsed+=d; updateHUD();
});
const endDraw=()=>{drawing=false;if(cur&&cur.pts.length<2)strokes.pop();cur=null;};
canvas.addEventListener('pointerup',endDraw);
canvas.addEventListener('pointercancel',endDraw);

// ── Creatures ─────────────────────────────────────────────────────
const COLORS=['#ff8a5c','#ffd166','#7fc7ff','#9ad36a','#ff9fd0','#c4a0ff'];
// Hats unlock at lifetime-delivered milestones; creatures wear them at random
const HATS=[{n:10,id:'cap'},{n:25,id:'bow'},{n:50,id:'sprout'},{n:100,id:'crown'}];
function pickHat(){
  const u=HATS.filter(h=>(save.total|0)>=h.n);
  if(!u.length||Math.random()<0.35)return null;
  return u[Math.floor(Math.random()*u.length)].id;
}
function checkHatUnlock(){
  for(const h of HATS)if(save.total===h.n)
    toast(t('🎉 '+h.n+'ひき とどけた！ あたらしい ぼうしを ゲット！','🎉 '+h.n+' delivered — new hat unlocked!'));
  persist();
}
function spawnOne(){
  creatures.push({x:level.spawn.x,y:level.spawn.y,vx:rules.dir*WALK,vy:0,dir:rules.dir,
    col:COLORS[spawned%COLORS.length],step:Math.random()*6.28,ground:false,
    turnCD:0,jumpCD:0,boostTimer:0,
    hat:pickHat(),blinkT:1+Math.random()*3,land:0,wasGround:false,stepA:0});
  spawned++;
}

function clamp(v,a,b){return v<a?a:v>b?b:v;}
function closestOnSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy||1;
  const tt=clamp(((px-ax)*dx+(py-ay)*dy)/l2,0,1);
  return{x:ax+dx*tt,y:ay+dy*tt};
}

function physics(dt){
  const g=rules.grav==='float'?520:1350;
  const SUB=3,s=dt/SUB;
  for(const c of creatures){
    if(c.turnCD>0)c.turnCD-=dt;
    if(c.jumpCD>0)c.jumpCD-=dt;
    if(c.boostTimer>0)c.boostTimer-=dt;
    c.blinkT-=dt; if(c.blinkT<-0.12)c.blinkT=2+Math.random()*3;
    if(c.land>0)c.land-=dt;
    if(c.stepA>0)c.stepA-=dt;
    for(let k=0;k<SUB;k++){
      c.vy+=g*s; c.vy=clamp(c.vy,-600,600); c.vx=clamp(c.vx,-600,600);
      c.x+=c.vx*s; c.y+=c.vy*s;
      let grounded=false,bestNy=1,gmat='normal';
      const hit=(nx,ny,pen,mat,rest)=>{
        c.x+=nx*pen; c.y+=ny*pen;
        const vn=c.vx*nx+c.vy*ny;
        if(vn<0){if(rest>0){c.vx-=(1+rest)*vn*nx;c.vy-=(1+rest)*vn*ny;}else{c.vx-=vn*nx;c.vy-=vn*ny;}}
        if(ny<bestNy){bestNy=ny;gmat=mat;if(ny<-0.4)grounded=true;}
      };
      for(const p of level.plats){
        const cx=clamp(c.x,p.x,p.x+p.w),cy=clamp(c.y,p.y,p.y+p.h);
        let dx=c.x-cx,dy=c.y-cy,d=Math.hypot(dx,dy);
        if(d<R){
          if(d<0.001){const L=c.x-p.x,Rr=p.x+p.w-c.x,T=c.y-p.y,B=p.y+p.h-c.y,m=Math.min(L,Rr,T,B);if(m===T){dx=0;dy=-1;}else if(m===B){dx=0;dy=1;}else if(m===L){dx=-1;dy=0;}else{dx=1;dy=0;}hit(dx,dy,R,'normal',0);}
          else{hit(dx/d,dy/d,R-d,'normal',0);}
        }
      }
      for(const st of strokes){
        const rest=st.mat==='bounce'?0.78:0,RR=R+st.half;
        for(let i=0;i<st.pts.length-1;i++){
          const a=st.pts[i],b=st.pts[i+1];
          const cp=closestOnSeg(c.x,c.y,a.x,a.y,b.x,b.y);
          let dx=c.x-cp.x,dy=c.y-cp.y,d=Math.hypot(dx,dy);
          if(d<RR&&d>0.001){
            const nx=dx/d,ny=dy/d;
            // step assist: a frontal contact at foot level is a stroke tip —
            // hop over it, and keep skipping the velocity correction while climbing
            if(nx*c.dir<-0.5&&cp.y>c.y-R&&(c.wasGround||c.stepA>0)){
              c.vy=Math.min(c.vy,-260); c.stepA=0.25;
            }
            else hit(nx,ny,RR-d,st.mat,rest);
            if(st.mat==='turn'&&c.turnCD<=0){
              c.dir*=-1; c.vx*=-0.4; c.turnCD=0.7;
              if(k===0)wordPop(c.x,c.y,t('もどれ！','Turn!'));
              blip(420);
            }
            if(st.mat==='jump'&&c.jumpCD<=0){
              c.vy=rules.grav==='float'?-300:-460; c.jumpCD=0.55;
              if(k===0)wordPop(c.x,c.y,t('とべ！','Jump!'));
              blip(560);
            }
            if(st.mat==='fast'){
              const was=c.boostTimer>0; c.boostTimer=0.25;
              if(!was&&k===0)wordPop(c.x,c.y,t('はやく！','Fast!'));
            }
          }
        }
      }
      if(grounded){
        const grip=gmat==='ice'?0.02:0.22;
        c.vx+=(c.dir*(c.boostTimer>0?WALK*2.3:WALK)-c.vx)*grip;
      }
      c.ground=grounded;
    }
    if(c.ground&&!c.wasGround)c.land=0.16;
    c.wasGround=c.ground;
    for(let f=0;f<level.fruits.length;f++){
      if(!fruitsGot[f]&&Math.hypot(c.x-level.fruits[f].x,c.y-level.fruits[f].y)<20){
        fruitsGot[f]=true;burst(level.fruits[f].x,level.fruits[f].y,'✨');blip(1150,0.05);
      }
    }
    c.step+=dt*(c.ground?10:3);
  }
  for(let i=creatures.length-1;i>=0;i--){
    const c=creatures[i],gr=level.goalRect;
    if(c.x>gr.x&&c.x<gr.x+gr.w&&c.y>gr.y-6&&c.y<gr.y+gr.h){home++;save.total=(save.total|0)+1;checkHatUnlock();burst(c.x,c.y,'🎉');creatures.splice(i,1);updateHUD();continue;}
    if(c.y>H+50||c.x<-60||c.x>W+60){lost++;creatures.splice(i,1);updateHUD();}
  }
  if(!won&&home>=level.goal){won=true;running=false;showBanner(true);}
  else if(!won&&running&&spawned>=level.total&&creatures.length===0){showBanner(false);}
}

// ── Particles ─────────────────────────────────────────────────────
function burst(x,y,emo){const n=reduce?3:7;for(let i=0;i<n;i++)particles.push({type:'e',x,y,vx:(Math.random()-.5)*140,vy:-60-Math.random()*120,life:.8,emo});}
function wordPop(x,y,txt){particles.push({type:'w',x,y,vx:(Math.random()-.5)*25,vy:-55,life:0.85,txt});}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.vy+=260*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.life<=0)particles.splice(i,1);}}

// ── Render ────────────────────────────────────────────────────────
const CLOUDS=[{y:70,s:15,v:7},{y:125,s:11,v:11},{y:45,s:9,v:15}];
function bg(){
  ctx.fillStyle='#f6efe0';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#e4ead4';ctx.lineWidth=1;
  for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle='rgba(213,197,160,.30)';
  ctx.beginPath();ctx.ellipse(210,H+40,270,120,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(720,H+50,330,150,0,0,6.28);ctx.fill();
  for(let i=0;i<CLOUDS.length;i++){
    const cl=CLOUDS[i],x=((reduce?i*300:gt*cl.v)+i*380)%(W+240)-120;
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.beginPath();ctx.arc(x,cl.y,cl.s,0,6.28);ctx.arc(x+cl.s,cl.y+4,cl.s*.8,0,6.28);ctx.arc(x-cl.s,cl.y+4,cl.s*.75,0,6.28);ctx.fill();
  }
}
const FRUIT_EMO=['🍓','🍎','🍊'];
function drawFruits(){
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<level.fruits.length;i++){
    if(fruitsGot[i])continue;
    const f=level.fruits[i];
    ctx.font='19px serif';
    ctx.fillText(FRUIT_EMO[i%3],f.x,f.y+(reduce?0:Math.sin(gt*2.2+i*2)*3));
  }
  for(let i=0;i<level.fruits.length;i++){
    ctx.globalAlpha=fruitsGot[i]?1:0.22;
    ctx.font='15px serif';
    ctx.fillText(FRUIT_EMO[i%3],22+i*22,22);
  }
  ctx.globalAlpha=1;
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function platforms(){
  for(const p of level.plats){
    rr(p.x,p.y,p.w,p.h,12);ctx.fillStyle='#caa06a';ctx.fill();
    if(p.g){rr(p.x,p.y,p.w,Math.min(16,p.h),12);ctx.fillStyle='#7fbf6a';ctx.fill();
      ctx.fillStyle='#6fae5c';for(let gx=p.x+6;gx<p.x+p.w-4;gx+=14)ctx.fillRect(gx,p.y-3,3,6);}
    ctx.fillStyle='rgba(255,255,255,.10)';ctx.fillRect(p.x+6,p.y+(p.g?18:6),p.w-12,3);
  }
}
function drawStrokes(){
  for(const st of strokes){
    const m=MATS.find(x=>x.id===st.mat)||MATS[0];
    ctx.lineJoin='round';ctx.lineCap='round';
    if(m.cmd){
      ctx.globalAlpha=0.18+0.14*Math.sin(gt*5);
      ctx.strokeStyle='#fff';ctx.lineWidth=st.half*2+10;
      ctx.beginPath();ctx.moveTo(st.pts[0].x,st.pts[0].y);
      for(let i=1;i<st.pts.length;i++)ctx.lineTo(st.pts[i].x,st.pts[i].y);
      ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.strokeStyle=m.col;ctx.lineWidth=st.half*2;
    ctx.beginPath();ctx.moveTo(st.pts[0].x,st.pts[0].y);
    for(let i=1;i<st.pts.length;i++)ctx.lineTo(st.pts[i].x,st.pts[i].y);
    ctx.stroke();
    if(st.mat==='ice'){ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;ctx.stroke();}
    if(st.mat==='bounce'){ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.setLineDash([3,7]);ctx.stroke();ctx.setLineDash([]);}
    if(st.pts.length>=2){
      const mid=st.pts[Math.floor(st.pts.length/2)];
      ctx.save();ctx.font='bold 11px "M PLUS Rounded 1c",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.fillText(t(m.ja,m.en),mid.x,mid.y);ctx.restore();
    }
  }
}
function drawGoal(){
  const{x,y,w,h}=level.goalRect;
  ctx.fillStyle='#e7c87a';rr(x+8,y+18,w-16,h-18,8);ctx.fill();
  ctx.fillStyle='#d98b53';ctx.beginPath();ctx.moveTo(x+2,y+22);ctx.lineTo(x+w/2,y-2);ctx.lineTo(x+w-2,y+22);ctx.closePath();ctx.fill();
  ctx.fillStyle='#7a5230';rr(x+w/2-11,y+h-24,22,24,5);ctx.fill();
  ctx.fillStyle='#fff3cf';ctx.beginPath();ctx.arc(x+w/2,y+h-15,3.5,0,6.28);ctx.fill();
  ctx.strokeStyle='#7a5230';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x+w/2,y-2);ctx.lineTo(x+w/2,y-20);ctx.stroke();
  ctx.fillStyle='#ff8a5c';ctx.beginPath();ctx.moveTo(x+w/2,y-20);ctx.lineTo(x+w/2+16,y-15);ctx.lineTo(x+w/2,y-10);ctx.closePath();ctx.fill();
}
function drawDoor(){
  const{x,y}=level.spawn,sy=y+R;
  ctx.fillStyle='#8a6b46';rr(x-20,sy-30,40,34,10);ctx.fill();
  ctx.fillStyle='#3a3340';ctx.beginPath();ctx.ellipse(x,sy-6,15,14,0,Math.PI,0,true);ctx.fill();
}
function drawHat(c,x,topY){
  if(c.hat==='cap'){
    ctx.fillStyle='#e0523f';ctx.beginPath();ctx.arc(x,topY+2,7,Math.PI,0);ctx.fill();
    ctx.fillRect(x-(c.dir>0?1:9),topY+1,10,2.5);
  }else if(c.hat==='bow'){
    ctx.fillStyle='#ff9fd0';ctx.beginPath();ctx.arc(x-4,topY,3.5,0,6.28);ctx.arc(x+4,topY,3.5,0,6.28);ctx.fill();
    ctx.fillStyle='#e06fa8';ctx.beginPath();ctx.arc(x,topY,2,0,6.28);ctx.fill();
  }else if(c.hat==='sprout'){
    ctx.strokeStyle='#5d9c4b';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,topY+2);ctx.lineTo(x,topY-4);ctx.stroke();
    ctx.fillStyle='#7fbf6a';ctx.beginPath();ctx.ellipse(x+4,topY-5,4,2.5,-0.5,0,6.28);ctx.fill();
  }else if(c.hat==='crown'){
    ctx.fillStyle='#ffce5c';ctx.beginPath();
    ctx.moveTo(x-7,topY+3);ctx.lineTo(x-7,topY-4);ctx.lineTo(x-3.5,topY);ctx.lineTo(x,topY-5);
    ctx.lineTo(x+3.5,topY);ctx.lineTo(x+7,topY-4);ctx.lineTo(x+7,topY+3);ctx.closePath();ctx.fill();
  }
}
function drawCreature(c){
  const bob=c.ground?Math.abs(Math.sin(c.step))*2:0;
  const sq=c.land>0?c.land/0.16:0,sx=1+0.26*sq,sy=1-0.26*sq;
  const cy=c.y-bob+R*(1-sy);
  if(c.boostTimer>0){ctx.globalAlpha=0.35;ctx.fillStyle='#ffce5c';ctx.beginPath();ctx.arc(c.x,cy,R+5,0,6.28);ctx.fill();ctx.globalAlpha=1;}
  ctx.fillStyle='#5a4a3a';ctx.beginPath();ctx.arc(c.x-4,c.y+R-2,3,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(c.x+4,c.y+R-2,3,0,6.28);ctx.fill();
  ctx.fillStyle=c.col;ctx.beginPath();ctx.ellipse(c.x,cy,R*sx,R*sy,0,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(c.x-3,cy-3,R*0.4,0,6.28);ctx.fill();
  const ex=c.dir>0?2:-2,ep=c.dir>0?1:-1;
  if(c.blinkT<0){
    ctx.strokeStyle='#3a3340';ctx.lineWidth=1.6;
    ctx.beginPath();ctx.moveTo(c.x-5+ex,cy-1);ctx.lineTo(c.x-1+ex,cy-1);
    ctx.moveTo(c.x+2+ex,cy-1);ctx.lineTo(c.x+6+ex,cy-1);ctx.stroke();
  }else{
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(c.x-3+ex,cy-1,3,0,6.28);ctx.arc(c.x+4+ex,cy-1,3,0,6.28);ctx.fill();
    ctx.fillStyle='#3a3340';ctx.beginPath();ctx.arc(c.x-3+ex+ep,cy-1,1.5,0,6.28);ctx.arc(c.x+4+ex+ep,cy-1,1.5,0,6.28);ctx.fill();
  }
  if(!c.ground&&c.vy>260){ctx.fillStyle='#3a3340';ctx.beginPath();ctx.arc(c.x+ex,cy+4,1.8,0,6.28);ctx.fill();}
  if(c.hat)drawHat(c,c.x,cy-R*sy);
}
function render(){
  ctx.clearRect(0,0,W,H);
  bg();platforms();drawGoal();drawDoor();drawStrokes();drawFruits();
  for(const c of creatures)drawCreature(c);
  for(const p of particles){
    if(p.type==='e'){ctx.globalAlpha=clamp(p.life*1.6,0,1);ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.emo,p.x,p.y);}
    else{ctx.globalAlpha=clamp(p.life*2.2,0,1);ctx.font='bold 13px "M PLUS Rounded 1c",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#3a3340';ctx.fillText(p.txt,p.x,p.y);}
  }
  ctx.globalAlpha=1;
}

let last=performance.now();
function frame(now){
  const dt=Math.min((now-last)/1000,0.05);last=now;gt+=dt;
  if(running&&!won){spawnT+=dt;if(spawned<level.total&&spawnT>0.85){spawnT=0;spawnOne();}physics(dt);}
  updateParticles(dt);render();requestAnimationFrame(frame);
}

  lang=lang==='ja'?'en':'ja';localStorage.setItem('lang',lang);
  document.documentElement.lang=lang;refreshUI();
});
function refreshUI(){
  document.getElementById('langBtn').textContent=lang==='ja'?'EN':'日本語';
  document.getElementById('brandSub').textContent=t('ことばを かいて、みんなを おうちへ','Write words · Guide them home');
  document.getElementById('resetBtn').title=t('やりなおす','Reset');
  document.getElementById('dailyBtn').textContent='📅 '+t('デイリー','Daily');
  document.getElementById('footer').innerHTML=t(
    'いきものは とまらず あるくよ。ゆびで ことばを かいて みちを つくり、おうちへ とどけよう。<br>'
    +'🔴 じるしの ことばは <b>コマンド</b> — いきものが ふれると、そのことばを よんで うごきが かわるよ。<br>'
    +'うえの ことばを タップすると、せかいの きまりが かわる。デイリーは まいにち あたらしい みちが うまれるよ。',
    'Creatures never stop walking. Write words to build the world — guide them home.<br>'
    +'Words marked with a 🔴 dot are <b>commands</b> — creatures read them on contact and obey.<br>'
    +'Tap the highlighted words above to change the laws of the world. The Daily is a brand-new level every day.'
  );
  syncStartBtn();buildPalette();renderRules();
}
document.getElementById('helpBtn').addEventListener('click',()=>{
  const h=document.getElementById('footer'); h.hidden=!h.hidden;
});

// ── Sound ─────────────────────────────────────────────────────────
let audio=null;
function ensureAudio(){if(!audio){try{audio=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(audio&&audio.state==='suspended')audio.resume();}
function blip(freq=440,vol=0.05){if(!audio||!freq)return;const o=audio.createOscillator(),g=audio.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,audio.currentTime);g.gain.linearRampToValueAtTime(vol,audio.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+0.2);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+0.22);}

// ── Init ──────────────────────────────────────────────────────────
refreshUI();loadLevel(0);requestAnimationFrame(frame);
})();
